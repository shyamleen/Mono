<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono Academy | Accounting Masterclass</title>
    <style>
        /* Keep all your original dashboard CSS styles right here */
        body { font-family: system-ui, sans-serif; background: #f8fafc; margin: 0; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; padding: 24px; }
        .main-content { flex: 1; padding: 40px; }
        .workbook-viewport { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Your original text-highlighting engine classes */
        .lazy-hl { transition: background-color 0.3s ease; }
        .triggered-lang { background-color: #fef08a !important; } /* Yellow */
        .triggered-asset { background-color: #bfdbfe !important; } /* Blue */
        .triggered-liability { background-color: #fecaca !important; } /* Red */
        .triggered-equity { background-color: #bbf7d0 !important; } /* Green */
        
        .scroll-reveal-card { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .scroll-reveal-card.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="sidebar">
            <h2>Mono Academy</h2>
            <hr style="border-color: #334155; margin: 20px 0;">
            <ul style="list-style: none; padding: 0;">
                <li style="margin-bottom: 12px;"><button onclick="loadLessonContent(1.1)" style="background: none; color: white; border: none; cursor: pointer;">Lesson 1.1: Intro</button></li>
                <li style="margin-bottom: 12px;"><button onclick="loadLessonContent(1.2)" style="background: none; color: white; border: none; cursor: pointer;">Lesson 1.2: Double-Entry</button></li>
                <li style="margin-bottom: 12px;"><button onclick="loadLessonContent(1.3)" style="background: none; color: white; border: none; cursor: pointer;">Lesson 1.3: T-Accounts</button></li>
            </ul>
        </div>

        <div class="main-content">
            <div id="workbook-content-area" class="workbook-viewport">
                <h3>Welcome back!</h3>
                <p>Select a lesson from the sidebar module menu to start exploring core calculations.</p>
            </div>
        </div>
    </div>

    <script>
        // FUNCTION A: The Dynamic File Loader
        function loadLessonContent(lessonId) {
            const container = document.getElementById("workbook-content-area");
            
            // Map the clicked ID directly to your new clean sub-files
            let fileName = "";
            if (lessonId === 1.1) fileName = "lessons/lesson1_1.html";
            else if (lessonId === 1.2) fileName = "lessons/lesson1_2.html";
            else if (lessonId === 1.3) fileName = "lessons/lesson1_3.html";
            
            if (!fileName) return;

            // Fetch the content file automatically over your local connection
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error("Lesson file could not be fetched.");
                    return response.text();
                })
                .then(htmlContent => {
                    // Inject the lesson file directly into the container viewport
                    container.innerHTML = htmlContent;
                    
                    // REBOOT the scroll highlights so they scan your fresh text content!
                    runScrollHighlightEngine();
                })
                .catch(error => {
                    console.error("Error:", error);
                    container.innerHTML = `<p style="color: #ef4444; font-weight: 600;">⚠️ Error loading lesson file contents.</p>`;
                });
        }

        // FUNCTION B: Your Highlight & Reveal Animation Setup
        function runScrollHighlightEngine() {
            const revealCards = document.querySelectorAll('.scroll-reveal-card');
            const highlightSpans = document.querySelectorAll('.lazy-hl');

            // Setup your intersection observers or scroll listeners here
            console.log("Highlight engine rebooted for new text layout blocks!");
            
            // Simple mockup behavior: Make everything visible immediately on inject
            revealCards.forEach(card => card.classList.add('visible'));
            highlightSpans.forEach(span => {
                const type = span.getAttribute('data-type');
                span.classList.add(`triggered-${type}`);
            });
        }
    </script>
</body>
</html>
