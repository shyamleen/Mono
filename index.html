<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono Academy | Accounting Masterclass</title>
    <style>
        /* --- Modern Custom Scrollbars (Pastel Blue) --- */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff; 
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb {
            background: #bae6fd;
            border-radius: 99px;
            border: 2px solid #ffffff;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7dd3fc; 
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }

        .dashboard-container { 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
        }
        
        /* Sidebar layout with pastel light blue background */
        .sidebar { 
            width: 310px; 
            background: #e0f2fe; 
            color: #0f172a; 
            padding: 24px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            flex-shrink: 0;
            border-right: 1px solid #bae6fd;
        }

        .sidebar-menu { 
            flex-grow: 1; 
            overflow-y: auto; 
            margin-bottom: 16px; 
            padding-right: 4px;
        }

        .main-content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
            background: #f1f5f9; 
            height: 100vh;
            box-sizing: border-box;
        }
        
        .workbook-viewport { 
            background: white; 
            padding: 32px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04); 
            max-width: 800px; 
            margin: 0 auto; 
            min-height: 400px; 
            position: relative; 
        }
        
        .nav-btn { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            width: 100%; 
            text-align: left; 
            background: none; 
            border: none; 
            color: #1e293b; 
            padding: 10px 12px; 
            cursor: pointer; 
            font-size: 13.5px; 
            border-radius: 8px; 
            transition: all 0.2s; 
            margin-bottom: 4px; 
            box-sizing: border-box;
            font-weight: 500;
        }
        
        .nav-btn span {
            color: #1e293b; 
        }

        .nav-btn:hover, .nav-btn.active { 
            background: rgba(125, 211, 252, 0.3); 
            color: #0369a1; 
        }

        .nav-btn:hover span, .nav-btn.active span {
            color: #0369a1;
            font-weight: 600;
        }
        
        .nav-btn .completion-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: rgba(15, 23, 42, 0.15); 
            flex-shrink: 0;
            margin-left: 10px;
        }
        
        .nav-btn.completed .completion-dot { 
            background: #10b981; 
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); 
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: none;
            border: none;
            color: #0369a1; 
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 12px 6px;
            cursor: pointer;
            margin-top: 16px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(125, 211, 252, 0.3);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding-left: 4px;
        }

        .accordion-content.open {
            max-height: 500px; 
            transition: max-height 0.4s ease-in;
        }

        .accordion-arrow {
            transition: transform 0.2s ease;
            font-size: 10px;
            color: #0369a1;
        }

        .accordion-header.active .accordion-arrow {
            transform: rotate(90deg);
        }

        .scroll-reveal-card { opacity: 1; transform: none; margin-bottom: 24px; }
        .lesson-footer-bar { margin-top: 40px; padding-top: 24px; border-top: 2px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }

        /* Floating note styling */
        .floating-note-popup {
            position: absolute;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 16px;
            width: 280px;
            z-index: 1000;
            display: none;
        }
        .floating-note-popup textarea {
            width: 100%; height: 70px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; font-size: 13px; resize: none; box-sizing: border-box; outline: none; font-family: inherit;
        }
        .floating-note-popup textarea:focus { border-color: #38bdf8; }

        .notes-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 24px; }
        .journal-note-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; position: relative; }
        .journal-note-quote { font-size: 13px; font-style: italic; color: #64748b; border-left: 3px solid #38bdf8; padding-left: 12px; margin-bottom: 12px; }
        .journal-note-text { font-size: 14px; color: #1e293b; font-weight: 500; }
        .delete-journal-btn { position: absolute; top: 16px; right: 16px; background: #fee2e2; color: #ef4444; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="sidebar">
            <h2 style="margin: 0 0 16px 0; font-size: 20px; color: #0369a1; cursor: pointer; letter-spacing: -0.02em; font-weight: 800;" onclick="loadDashboard()">Mono Academy</h2>
            
            <button class="nav-btn active" id="dashboard-nav-btn" onclick="loadDashboard()" style="margin-bottom: 8px; font-weight: 700;">
                <span>🏠 Progress Dashboard</span>
            </button>

            <div class="sidebar-menu">
                <button class="accordion-header active" onclick="toggleAccordion('module1-content', this)">
                    <span>Module 1: Accounting Basics</span>
                    <span class="accordion-arrow">▶</span>
                </button>
                <div id="module1-content" class="accordion-content open">
                    <button class="nav-btn" id="nav-1.1" onclick="loadLessonContent('1.1')">
                        <span>Lesson 1.1: Introduction</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-1.2" onclick="loadLessonContent('1.2')">
                        <span>Lesson 1.2: Accounting Equation</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-1.3" onclick="loadLessonContent('1.3')">
                        <span>Lesson 1.3: T-Accounts System</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-1.4" onclick="loadLessonContent('1.4')">
                        <span>Lesson 1.4: The Journal and Ledger</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-1.5" onclick="loadLessonContent('1.5')">
                        <span>Lesson 1.5: The Trial Balance</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-1.6" onclick="loadLessonContent('1.6')">
                        <span>Lesson 1.6: Review and Quiz</span>
                        <span class="completion-dot"></span>
                    </button>
                </div>

                <button class="accordion-header" onclick="toggleAccordion('module2-content', this)">
                    <span>Module 2: Financial Statements</span>
                    <span class="accordion-arrow">▶</span>
                </button>
                <div id="module2-content" class="accordion-content">
                    <button class="nav-btn" id="nav-2.1" onclick="loadLessonContent('2.1')">
                        <span>Lesson 2.1: Intro to Financial Statements</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-2.2" onclick="loadLessonContent('2.2')">
                        <span>Lesson 2.2: The Income Statement</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-2.3" onclick="loadLessonContent('2.3')">
                        <span>Lesson 2.3: The Balance Sheet</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-2.4" onclick="loadLessonContent('2.4')">
                        <span>Lesson 2.4: Statement of Owner’s Equity</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-2.5" onclick="loadLessonContent('2.5')">
                        <span>Lesson 2.5: The Cash Flow Statement</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-2.6" onclick="loadLessonContent('2.6')">
                        <span>Lesson 2.6: Module 2 Capstone</span>
                        <span class="completion-dot"></span>
                    </button>
                </div>

                <button class="accordion-header" onclick="toggleAccordion('module3-content', this)">
                    <span>Module 3: Health & Profitability</span>
                    <span class="accordion-arrow">▶</span>
                </button>
                <div id="module3-content" class="accordion-content">
                    <button class="nav-btn" id="nav-3.1" onclick="loadLessonContent('3.1')">
                        <span>Lesson 3.1: Liquidity Flight Deck</span>
                        <span class="completion-dot"></span>
                    </button>
                    <button class="nav-btn" id="nav-3.2" onclick="loadLessonContent('3.2')">
                        <span>Lesson 3.2: Profitability Prism</span>
                        <span class="completion-dot"></span>
                    </button>
                </div>
            </div>

            <div style="border-top: 1px solid rgba(3, 105, 161, 0.2); padding-top: 16px;">
                <button class="nav-btn" id="nav-notes" onclick="loadNotesPage()">
                    <span style="display: flex; align-items: center; gap: 8px;">📝 My Study Notes</span>
                    <span id="notes-counter-badge" style="background: #38bdf8; color: #0f172a; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 99px; transition: all 0.2s;">0</span>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div id="workbook-content-area" class="workbook-viewport">
            </div>
        </div>
    </div>

    <div id="floating-note-box" class="floating-note-popup">
        <div style="font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 6px;">Add Note to Selection:</div>
        <div id="popup-selected-text" style="font-size: 12px; font-style: italic; color: #475569; background: #f8fafc; padding: 6px; border-radius: 6px; border-left: 2px solid #cbd5e1; margin-bottom: 10px; max-height: 50px; overflow-y: auto; line-height: 1.3;"></div>
        <textarea id="popup-note-input" placeholder="Enter your note here..."></textarea>
        <div style="display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end;">
            <button onclick="closeNotePopup()" style="background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;">Cancel</button>
            <button onclick="saveNote()" style="background: #38bdf8; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer;">Save</button>
        </div>
    </div>

    <script>
        let completedLessons = JSON.parse(localStorage.getItem('mono_completed_lessons')) || [];
        let studyNotes = JSON.parse(localStorage.getItem('mono_study_notes')) || [];
        let selectedQuoteText = ""; 
        
        const curriculum = [
            { id: "1.1", name: "Lesson 1.1: Introduction to Accounting", desc: "Foundational concepts and the language of business." },
            { id: "1.2", name: "Lesson 1.2: The Core Accounting Equation", desc: "Master Assets, Liabilities, and Owner's Equity." },
            { id: "1.3", name: "Lesson 1.3: The T-Accounts System", desc: "Visualize entries cleanly using left-side and right-side columns." },
            { id: "1.4", name: "Lesson 1.4: Double-Entry Matrix Rules", desc: "Why debits must always balance with matching credits." },
            { id: "1.5", name: "Lesson 1.5: Ledger Book Posting Execution", desc: "Transfer raw transactions into visual active ledger pages." },
            { id: "1.6", name: "Lesson 1.6: Introduction to the Trial Balance", desc: "Verify ledger accuracy using balanced spreadsheets." },
            { id: "2.1", name: "Lesson 2.1: Intro to Financial Statements", desc: "The four core statements and how they summarize financial positions." },
            { id: "2.2", name: "Lesson 2.2: The Income Statement", desc: "Understand revenues, expenses, and calculating net profit or loss." },
            { id: "2.3", name: "Lesson 2.3: The Balance Sheet", desc: "Deep dive into organizing and verifying assets, liabilities, and equity." },
            { id: "2.4", name: "Lesson 2.4: Statement of Owner’s Equity", desc: "Track how investments, drawings, and earnings alter capital over time." },
            { id: "2.5", name: "Lesson 2.5: The Cash Flow Statement", desc: "Learn to track actual operational, investing, and financing cash changes." },
            { id: "2.6", name: "Lesson 2.6: Module 2 Capstone: Full Financial Statements", desc: "Put it all together and construct a complete set of integrated statements." },
            // Module 3 Paths Added
            { id: "3.1", name: "Lesson 3.1: The Liquidity Flight Deck", desc: "Monitor near-term liquidity safety margins and calculations." },
            { id: "3.2", name: "Lesson 3.2: The Profitability Prism", desc: "Evaluate margin optimization across gross and net profit thresholds." }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            updateSidebarVisuals();
            updateNotesBadge();
            initHighlightListener();
        });

        function toggleAccordion(id, btn) {
            const panel = document.getElementById(id);
            btn.classList.toggle('active');
            panel.classList.toggle('open');
        }

        function updateNotesBadge() {
            const badge = document.getElementById("notes-counter-badge");
            if (badge) {
                badge.textContent = studyNotes.length;
                badge.style.background = studyNotes.length > 0 ? "#0284c7" : "rgba(15, 23, 42, 0.08)";
                badge.style.color = studyNotes.length > 0 ? "#ffffff" : "rgba(15, 23, 42, 0.6)";
            }
        }

        function loadDashboard() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('dashboard-nav-btn').classList.add('active');

            const container = document.getElementById("workbook-content-area");
            const totalCount = curriculum.length;
            const completedCount = completedLessons.length;
            const progressPercent = Math.round((completedCount / totalCount) * 100);

            let cardsHtml = '';
            curriculum.forEach(lesson => {
                const isCompleted = completedLessons.includes(lesson.id);
                cardsHtml += `
                    <div style="background: #ffffff; border: 1px solid ${isCompleted ? '#bbf7d0' : '#e2e8f0'}; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 12px;">
                        <div>
                            <span style="font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; background: ${isCompleted ? '#dcfce7' : '#f1f5f9'}; color: ${isCompleted ? '#166534' : '#64748b'};">
                                ${isCompleted ? '✓ Completed' : 'Pending'}
                            </span>
                            <h4 style="margin: 8px 0 4px 0; font-size: 15px; font-weight: 700; color: #0f172a;">${lesson.name}</h4>
                            <p style="margin: 0; font-size: 13px; color: #64748b; line-height: 1.4;">${lesson.desc}</p>
                        </div>
                        <button onclick="loadLessonContent('${lesson.id}')" style="background: #0f172a; color: white; border: none; padding: 10px 18px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer;">
                            ${isCompleted ? 'Review' : 'Start'}
                        </button>
                    </div>
                `;
            });

            container.innerHTML = `
                <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 800; color: #0f172a;">Academy Dashboard</h1>
                <p style="color: #64748b; margin-top: 0; margin-bottom: 24px;">Track your progress across modules.</p>
                <div style="background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); padding: 24px; border-radius: 12px; color: white; display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
                    <div>
                        <h2 style="margin: 0 0 8px 0; font-size: 22px;">Progress: ${progressPercent}% Complete</h2>
                        <div style="width: 250px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden;">
                            <div style="width: ${progressPercent}%; height: 100%; background: white;"></div>
                        </div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 8px; text-align: center;">
                        <span style="font-size: 24px; font-weight: 800;">${completedCount} / ${totalCount}</span>
                    </div>
                </div>
                ${cardsHtml}
            `;
        }

        function loadLessonContent(lessonId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`nav-${lessonId}`);
            if (activeBtn) activeBtn.classList.add('active');

            const container = document.getElementById("workbook-content-area");
            const parts = String(lessonId).split('.');
            
            // Format to match Lesson3_1.html pattern matching your master logic
            const fileName = `lessons/Lesson${parts[0]}_${parts[1]}.html?t=${Date.now()}`;

            fetch(fileName, { cache: "no-store" })
                .then(response => {
                    if (!response.ok) throw new Error(`Missing page: ${fileName}`);
                    return response.text();
                })
                .then(htmlContent => {
                    const isCompleted = completedLessons.includes(lessonId);
                    
                    container.innerHTML = `
                        <button onclick="loadDashboard()" style="background: none; border: none; color: #64748b; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 20px; padding: 0;">
                            ⬅ Back to Dashboard
                        </button>
                        
                        <div id="inner-lesson-content">${htmlContent}</div>
                        
                        <div class="lesson-footer-bar">
                            <div><span style="font-size: 13px; color: #64748b;">Finished studying this material?</span></div>
                            <div>
                                ${isCompleted ? `
                                    <span style="color: #10b981; font-weight: 700; font-size: 14px; margin-right: 16px;">✓ Completed</span>
                                    <button onclick="loadDashboard()" style="background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 8px; cursor: pointer;">Exit Lesson</button>
                                ` : `
                                    <button onclick="markCompleteAndReturn('${lessonId}')" style="background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer;">Mark Lesson as Completed ✓</button>
                                `}
                            </div>
                        </div>
                    `;
                    
                    // Evaluate scripts
                    const scriptElements = container.querySelectorAll("script");
                    scriptElements.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                })
                .catch(error => {
                    console.error(error);
                    container.innerHTML = `<p style="color: #ef4444; font-weight: 600; padding: 20px; background: #fef2f2; border-radius: 8px;">⚠️ Failed to load lesson files (${fileName}). Ensure capitals match.</p>`;
                });
        }

        function markCompleteAndReturn(lessonId) {
            if (!completedLessons.includes(lessonId)) {
                completedLessons.push(lessonId);
                localStorage.setItem('mono_completed_lessons', JSON.stringify(completedLessons));
            }
            updateSidebarVisuals();
            loadDashboard();
        }

        function updateSidebarVisuals() {
            curriculum.forEach(lesson => {
                const btn = document.getElementById(`nav-${lesson.id}`);
                if (btn) {
                    if (completedLessons.includes(lesson.id)) {
                        btn.classList.add('completed');
                    } else {
                        btn.classList.remove('completed');
                    }
                }
            });
        }

        function initHighlightListener() {
            document.getElementById("workbook-content-area").addEventListener("mouseup", handleTextSelection);
            document.getElementById("workbook-content-area").addEventListener("touchend", handleTextSelection);
            document.addEventListener("mousedown", (e) => {
                const popup = document.getElementById("floating-note-box");
                if (popup.style.display === "block" && !popup.contains(e.target)) {
                    setTimeout(closeNotePopup, 100);
                }
            });
        }

        function handleTextSelection(event) {
            const selectedText = window.getSelection().toString().trim();
            if (selectedText.length > 3) {
                selectedQuoteText = selectedText;
                const popup = document.getElementById("floating-note-box");
                const selectedDisplay = document.getElementById("popup-selected-text");
                const inputField = document.getElementById("popup-note-input");
                
                selectedDisplay.textContent = `"${selectedText}"`;
                inputField.value = "";

                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    popup.style.top = `${rect.bottom + window.scrollY + 8}px`;
                    popup.style.left = `${rect.left + window.scrollX}px`;
                    popup.style.display = "block";
                }
            }
        }

        function closeNotePopup() {
            document.getElementById("floating-note-box").style.display = "none";
            selectedQuoteText = "";
        }

        function saveNote() {
            const noteText = document.getElementById("popup-note-input").value.trim();
            if (!noteText) return;
            const newNote = { id: Date.now(), quote: selectedQuoteText, text: noteText };
            studyNotes.push(newNote);
            localStorage.setItem('mono_study_notes', JSON.stringify(studyNotes));
            updateNotesBadge();
            closeNotePopup();
            window.getSelection().removeAllRanges();
            if(document.getElementById('nav-notes').classList.contains('active')) loadNotesPage();
        }

        function loadNotesPage() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-notes').classList.add('active');
            const container = document.getElementById("workbook-content-area");

            if (studyNotes.length === 0) {
                container.innerHTML = `
                    <h1 style="font-size: 24px; color: #0f172a; margin-bottom: 8px;">My Study Notes</h1>
                    <p style="color: #64748b; margin-bottom: 24px;">No notes saved yet. Highlight any lesson text to take a note!</p>
                `;
                return;
            }

            const notesCardsHtml = studyNotes.map(note => `
                <div class="journal-note-card">
                    <button class="delete-journal-btn" onclick="deleteNoteFromJournal(${note.id})">Delete</button>
                    <div class="journal-note-quote">"${note.quote}"</div>
                    <div class="journal-note-text">${note.text}</div>
                </div>
            `).join('');

            container.innerHTML = `
                <h1 style="font-size: 24px; color: #0f172a; margin-bottom: 24px;">My Study Notes</h1>
                <div class="notes-grid">${notesCardsHtml}</div>
            `;
        }

        function deleteNoteFromJournal(noteId) {
            studyNotes = studyNotes.filter(note => note.id !== noteId);
            localStorage.setItem('mono_study_notes', JSON.stringify(studyNotes));
            updateNotesBadge();
            loadNotesPage();
        }
    </script>
</body>
</html>
